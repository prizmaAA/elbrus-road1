<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts: Inter & Montserrat & JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['Montserrat', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- React 18, React DOM, and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html {
      scroll-behavior: smooth;
    }
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;

</head>

    // Вспомогательный компонент для динамического вызова иконки по текстовому имени
    function LucideIcon({ name, className = "" }) {
      switch (name) {
        case "Hammer": return <HammerIcon className={className} />;
        case "Phone": return <PhoneIcon className={className} />;
        case "Truck": return <TruckIcon className={className} />;
        case "Layers": return <LayersIcon className={className} />;
        case "Trees": return <TreesIcon className={className} />;
        case "Spline": return <SplineIcon className={className} />;
        case "Wallet": return <WalletIcon className={className} />;
        case "FileCheck": return <FileCheckIcon className={className} />;
        case "Wrench": return <HammerIcon className={className} />; // Fallback
        case "Activity": return <ShieldCheckIcon className={className} />; // Fallback
        default: return <HammerIcon className={className} />;
      }
    }


    // --- СТАТИЧЕСКИЕ ДАННЫЕ ПРИЛОЖЕНИЯ ---
    const SERVICES_DATA = [
      {

    // --- ШАПКА САЙТА (HEADER) ---
    function Header({ activeTab, setActiveTab }) {
      const [isOpen, setIsOpen] = useState(false);

      const navigationItems = [
        { id: "about", label: "О компании" },
        { id: "services", label: "Услуги" },
        { id: "portfolio", label: "Наши работы" },
        { id: "contacts", label: "Контакты" },
      ];

      return (
        <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all duration-300">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between items-center h-20 sm:h-24">
              
              {/* Логотип */}
              <div 
                className="flex items-center space-x-3 cursor-pointer group"
                onClick={() => setActiveTab("about")}
              >
                <div className="bg-amber-500 text-slate-900 p-2.5 rounded-xl shadow-md group-hover:bg-amber-600 transition-colors">
                  <HammerIcon className="h-6 sm:h-7 w-6 sm:w-7" />
                </div>
                <div>
                  <span className="block font-display font-black text-xl sm:text-2xl tracking-tight text-slate-900 group-hover:text-amber-600 transition-colors">
                    ЭЛЬБРУС
                  </span>
                  <span className="block text-[10px] sm:text-xs font-mono uppercase tracking-[0.15em] text-slate-500 font-bold">
                    производство и дорожное строительство
                  </span>
                </div>
              </div>

              {/* Крупные и понятные кнопки навигации */}
              <nav className="hidden md:flex items-center space-x-2 lg:space-x-4">
                {navigationItems.map((item) => (
                  <button
                    key={item.id}
                    onClick={() => setActiveTab(item.id)}
                    className={`px-5 py-3 rounded-xl font-display font-bold text-sm tracking-wide uppercase transition-all duration-200 border-2 cursor-pointer ${
                      activeTab === item.id
                        ? "bg-slate-900 text-white border-slate-900 shadow-sm"
                        : "bg-transparent text-slate-700 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-200"
                    }`}
                  >
                    {item.label}
                  </button>
                ))}
              </nav>

              {/* Телефоны компании в шапке */}
              <div className="hidden lg:flex items-center space-x-3">
                <a 
                  href="tel:+73522550476" 
                  className="flex items-center space-x-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-5 py-3 rounded-xl transition-all duration-200 shadow-sm hover:shadow-md cursor-pointer"
                >
                  <PhoneIcon className="h-4 w-4" />
                  <span className="font-display text-sm tracking-wide font-black">+7 (3522) 55-04-76</span>
                </a>
              </div>

              {/* Бургер-кнопка для мобильных устройств */}
              <div className="md:hidden flex items-center">
                <button
                  onClick={() => setIsOpen(!isOpen)}
                  className="p-2.5 rounded-xl bg-slate-50 text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none cursor-pointer"
                >
                  {isOpen ? <XIcon className="h-6 w-6" /> : <MenuIcon className="h-6 w-6" />}
                </button>
              </div>

            </div>
          </div>

          {/* Мобильное всплывающее меню */}
          {isOpen && (
            <div className="md:hidden bg-white border-b border-gray-100 py-4 px-4 space-y-2 animate-fadeIn">
              {navigationItems.map((item) => (
                <button
                  key={item.id}
                  onClick={() => {
                    setActiveTab(item.id);
                    setIsOpen(false);
                  }}
                  className={`block w-full text-left px-5 py-3.5 rounded-xl font-display font-bold text-sm uppercase tracking-wide transition-all ${
                    activeTab === item.id
                      ? "bg-slate-900 text-white"
                      : "bg-slate-50 text-slate-700 hover:bg-slate-100"
                  }`}
                >
                  {item.label}
                </button>
              ))}
              <a
                href="tel:+73522550476"
                className="flex items-center justify-center space-x-2 w-full bg-amber-500 text-slate-900 font-bold px-5 py-3.5 rounded-xl text-center shadow-sm font-display"
              >
                <PhoneIcon className="h-4 w-4" />
                <span className="text-sm tracking-wide font-black">+7 (3522) 55-04-76</span>
              </a>
            </div>
          )}
        </header>
      );
    }


    // --- СТРАНИЦА «О КОМПАНИИ» (ABOUT) ---
    function About({ onExploreServices, onExplorePortfolio }) {

      const filteredProjects = filter === "Все"

        : PORTFOLIO_DATA.filter((p) => p.category.toLowerCase().includes(filter.toLowerCase().substring(0, 8)));

      return (
        <div className="space-y-12 animate-fadeIn">
          <div className="text-center max-w-3xl mx-auto space-y-4">
            <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">

                  filter === cat
                    ? "bg-slate-900 text-amber-400 border-slate-900 shadow-sm"

                  {/* Завеса при наведении */}
                  <div className="absolute inset-0 bg-slate-950/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                    <button 
                      onClick={() => setSelectedProject(project)}

                      <span className="text-slate-900 font-sans font-bold text-sm">{selectedProject.location}</span>

                    <div className="bg-slate-50 p-4 rounded-xl">
                      <span className="block text-gray-400 font-display font-bold uppercase tracking-wider mb-1">Год сдачи</span>

            </div>

      );

    // --- НИЖНЯЯ ПАНЕЛЬ С КОНТАКТАМИ И ФОРМОЙ (FOOTER) ---
    function Footer() {
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [service, setService] = useState("");
      const [comment, setComment] = useState("");
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState("");

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim() || !phone.trim() || !service) {
          setError("Пожалуйста, заполните все обязательные поля.");
          return;
        }
        setError("");
        setSubmitted(true);
        setName("");
        setPhone("");
        setService("");
        setComment("");
      };

      return (
        <footer className="bg-slate-950 text-gray-400 font-sans pt-16 pb-8 border-t border-slate-900 rounded-t-[40px] mt-16 text-left">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-12">
            
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
              
              {/* Контакты компании и реквизиты */}
              <div className="lg:col-span-5 space-y-8">
                <div className="space-y-4">
                  <div className="flex items-center space-x-3">
                    <div className="bg-amber-500 text-slate-950 p-2 rounded-lg">
                      <HammerIcon className="h-5 w-5 text-slate-950" />
                    </div>
                    <span className="font-display font-black text-xl sm:text-2xl text-white tracking-tight">
                      ЭЛЬБРУС
                    </span>
                  </div>
                  <p className="text-gray-400 text-sm leading-relaxed max-w-sm">
                    Профессиональные услуги дорожного строительства, качественного асфальтирования, благоустройства общественных территорий и разработки грунтов в соответствии с требованиями СНиП и ГОСТ по Курганской области.
                  </p>
                </div>

                <div className="space-y-4 pt-2">
                  <h4 className="font-display font-bold text-white text-sm uppercase tracking-wider">Контакты компании</h4>
                  
                  <div className="space-y-3.5">
                    <a href="tel:+73522550476" className="flex items-start space-x-3.5 group text-sm md:text-base hover:text-white transition-colors">
                      <PhoneIcon className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                      <div>
                        <span className="block font-semibold text-white font-display">+7 (3522) 55-04-76</span>
                        <span className="text-xs text-gray-500">Прием звонков и консультации</span>
                      </div>
                    </a>

                    <div className="flex items-start space-x-3.5 text-sm md:text-base">
                      <ClockIcon className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                      <div>
                        <span className="block font-semibold text-white font-display">Пн - Вс: 08:00 - 21:00</span>
                        <span className="text-xs text-gray-500">Техника работает круглосуточно по согласованию</span>
                      </div>
                    </div>

                    <a href="mailto:elbrus-kurgan@yandex.ru" className="flex items-start space-x-3.5 group text-sm md:text-base hover:text-white transition-colors">
                      <MailIcon className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                      <div>
                        <span className="block font-semibold text-white font-display">elbrus-kurgan@yandex.ru</span>
                        <span className="text-xs text-gray-500">Для предложений и коммерческих тендеров</span>
                      </div>
                    </a>

                    <div className="flex items-start space-x-3.5 text-sm md:text-base">
                      <MapPinIcon className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                      <div>
                        <span className="block font-semibold text-white font-display">640022, Курганская обл., г. Курган, ул. Савельева, д. 58, кв. 33</span>
                        <span className="text-xs text-gray-500">Базы размещения техники в гг. Курган и Шадринск</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-slate-900 border border-white/5 rounded-2xl p-4 flex items-center space-x-4 max-w-sm">
                  <ShieldCheckIcon className="h-10 w-10 text-amber-500 shrink-0" />
                  <div>
                    <span className="block text-white font-display font-bold text-sm">СРО и ГОСТ лицензии</span>
                    <span className="block text-xs text-gray-500">Все допуски на крупное дорожное строительство в наличии.</span>
                  </div>
                </div>
              </div>

              {/* Форма профессионального расчета */}
              <div id="callback-form-box" className="lg:col-span-7 bg-slate-900 border border-white/5 rounded-3xl p-6 sm:p-8 space-y-6">
                <div className="space-y-1.5">
                  <h3 className="font-display font-black text-xl sm:text-2xl text-white">
                    Заказать профессиональный расчёт
                  </h3>
                  <p className="text-gray-400 text-sm">
                    Закажите бесплатный выезд инженера-геодезиста на ваш объект. Мы свяжемся с вами в течение 15 минут.
                  </p>
                </div>

                {submitted ? (

                    <div className="flex items-center space-x-3">
                      <div className="bg-emerald-500 text-slate-950 p-1.5 rounded-full font-bold text-xs">✓</div>
                      <h4 className="font-display font-bold text-lg">Заявка отправлена!</h4>
                    </div>
                    <p className="text-sm text-gray-300">
                      Благодарим за обращение. Наш специалист свяжется с вами по указанному телефону в ближайшее время.
                    </p>
                    <button
                      onClick={() => setSubmitted(false)}
                      className="text-emerald-400 hover:text-emerald-300 font-display font-bold text-xs uppercase tracking-wide cursor-pointer"
                    >
                      Отправить еще одну заявку
                    </button>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit} className="space-y-4 text-white">
                    {error && <p className="text-rose-400 text-xs font-mono">{error}</p>}
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div className="space-y-1.5">
                        <label className="text-xs font-mono uppercase tracking-wider text-gray-400 font-bold">
                          Ваше имя <span className="text-amber-500">*</span>
                        </label>
                        <input
                          type="text"
                          required
                          placeholder="Иван Петров"
                          value={name}
                          onChange={(e) => setName(e.target.value)}
                          className="w-full bg-slate-950 border border-white/10 hover:border-amber-500/50 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-3 placeholder-gray-600 text-sm text-white"
                        />
                      </div>
                      
                      <div className="space-y-1.5">
                        <label className="text-xs font-mono uppercase tracking-wider text-gray-400 font-bold">
                          Номер телефона <span className="text-amber-500">*</span>
                        </label>
                        <input
                          type="tel"
                          required
                          placeholder="+7 (___) ___-__-__"
                          value={phone}
                          onChange={(e) => setPhone(e.target.value)}
                          className="w-full bg-slate-950 border border-white/10 hover:border-amber-500/50 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-3 placeholder-gray-600 text-sm text-white"
                        />
                      </div>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-mono uppercase tracking-wider text-gray-400 font-bold">
                        Тип услуги <span className="text-amber-500">*</span>
                      </label>
                      <select
                        required
                        value={service}
                        onChange={(e) => setService(e.target.value)}
                        className="w-full bg-slate-950 border border-white/10 hover:border-amber-500/50 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-3 text-sm text-white"
                      >
                        <option value="" disabled>-- Выберите из списка --</option>
                        <option value="road-construction">Строительство новых дорог</option>
                        <option value="road-paving">Асфальтирование дорог и тротуаров</option>
                        <option value="earthworks">Земляные работы, планировка</option>
                        <option value="curb-installation">Установка бортовых камней</option>
                        <option value="landscaping">Благоустройство территорий и парков</option>
                        <option value="excavation">Разработка котлованов</option>
                        <option value="road-marking">Профессиональная разметка дорог</option>
                      </select>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-mono uppercase tracking-wider text-gray-400 font-bold">
                        Детали застройки (необязательно)
                      </label>
                      <textarea
                        rows={3}
                        placeholder="Ориентировочная площадь, адрес объекта..."
                        value={comment}
                        onChange={(e) => setComment(e.target.value)}
                        className="w-full bg-slate-950 border border-white/10 hover:border-amber-500/50 focus:border-amber-500 focus:outline-none rounded-xl px-4 py-3 text-sm text-white"
                      />
                    </div>

                    <button
                      type="submit"
                      className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-display font-black tracking-wide text-xs uppercase px-8 py-4 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer shadow-lg"
                    >
                      <SendIcon className="h-4 w-4 text-slate-950" />
                      Отправить заявку на замер
                    </button>

                    <span className="block text-[10px] text-gray-500 leading-normal text-center">
                      Нажимая на кнопку, вы соглашаетесь на обработку данных по ФЗ № 152-ФЗ.
                    </span>
                  </form>
                )}
              </div>

            </div>

            <div className="border-t border-slate-900/60 pt-8 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500 space-y-4 md:space-y-0">
              <p>© {new Date().getFullYear()} ООО «ЭЛЬБРУС». Все права защищены.</p>
              <div className="flex gap-6">
                <a href="#about" className="hover:text-amber-500 transition-colors">Политика конфиденциальности</a>
                <a href="#services" className="hover:text-amber-500 transition-colors">Пользовательское соглашение</a>
              </div>
            </div>

          </div>
        </footer>
      );
    }


    // --- ОСНОВНОЙ КОМПОНЕНТ ПРИЛОЖЕНИЯ (APP) ---
    function App() {
      const [activeTab, setActiveTab] = useState("about");

      useEffect(() => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, [activeTab]);

      return (
        <div className="min-h-screen bg-slate-50/50 flex flex-col font-sans">
          
          {/* Информационная строка сверху */}
          <div className="bg-slate-900 text-gray-400 py-2 px-4 text-xs font-medium border-b border-white/5 text-left">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-1.5">
              <div className="flex items-center space-x-4">
                <span className="flex items-center gap-1.5">
                  <span className="h-1.5 w-1.5 rounded-full bg-amber-500 animate-pulse" />
                  Работаем по всей Курганской области и УрФО
                </span>
              </div>
              <div className="flex items-center space-x-4 font-mono text-[11px]">
                <span>ООО «ЭЛЬБРУС»</span>
                <span>|</span>
                <span>ИНН: 4501194763</span>
              </div>
            </div>
          </div>

          <Header activeTab={activeTab} setActiveTab={setActiveTab} />

          {/* Тело страницы с подгрузкой выбранного таба */}
          <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-16">
            
            {activeTab === "about" && (
              <About 
                onExploreServices={() => setActiveTab("services")} 
                onExplorePortfolio={() => setActiveTab("portfolio")} 
              />
            )}
            
            {activeTab === "services" && <Services />}
            
            {activeTab === "portfolio" && <Portfolio />}
            
            {activeTab === "contacts" && (
              <div className="space-y-12 animate-fadeIn">
                <div className="text-center max-w-3xl mx-auto space-y-4">
                  <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">
                    Контактная информация ООО «ЭЛЬБРУС»
                  </h2>
                  <p className="text-gray-600 font-sans max-w-2xl mx-auto text-base">
                    Мы всегда на связи и готовы проконсультировать вас по любым дорожным, производственным и благоустроительным вопросам.
                  </p>
                  <div className="h-1.5 w-20 bg-amber-500 mx-auto rounded-full" />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                  <div className="bg-white border border-gray-100 rounded-3xl p-8 sm:p-10 shadow-sm space-y-8 flex flex-col justify-between text-left">
                    <div className="space-y-6">
                      <h3 className="font-display font-black text-2xl text-slate-900">Административный офис</h3>
                      <p className="text-gray-600 text-sm leading-relaxed">
                        Координируем дорожно-строительные работы по Курганской области. Располагаем собственным штатом из 26 высококвалифицированных специалистов и широким спектром современной дорожной спецтехники для укладки, разметки и земляных работ.
                      </p>
                    </div>

                    <div className="space-y-4">
                      <div className="flex items-center space-x-3 text-sm sm:text-base text-gray-700">
                        <MapPinIcon className="h-5 w-5 text-amber-500 shrink-0" />
                        <span>640022, Курганская область, г. Курган, ул. Савельева, д. 58, кв. 33</span>
                      </div>
                      <div className="flex items-center space-x-3 text-sm sm:text-base text-gray-700 font-bold">
                        <PhoneIcon className="h-5 w-5 text-amber-500 shrink-0" />
                        <span>+7 (3522) 55-04-76</span>
                      </div>
                    </div>

                    <div className="bg-amber-500/10 border border-amber-500/15 p-5 rounded-2xl flex items-start space-x-3">
                      <TruckIcon className="h-6 w-6 text-amber-600 shrink-0 mt-0.5" />
                      <div>
                        <span className="block font-display font-bold text-slate-900 text-sm">Бесплатный выезд инженера и замерщика</span>
                        <span className="block text-slate-700 text-xs mt-1">

                        </span>
                      </div>
                    </div>
                  </div>

                  <div className="bg-slate-900 rounded-3xl p-8 sm:p-10 shadow-sm text-white flex flex-col justify-between relative overflow-hidden min-h-[350px]">
                    <div className="absolute inset-0 bg-cover bg-center brightness-40 pointer-events-none" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&w=1200&q=80')` }} />
                    <div className="relative z-10 space-y-6 text-left">
                      <span className="text-[10px] bg-amber-500/20 text-amber-400 font-mono font-bold border border-amber-500/20 px-3.5 py-1.5 rounded-full uppercase tracking-wider">
                        Производственные мощности
                      </span>
                      <h3 className="font-display font-black text-2xl sm:text-3xl text-white tracking-tight leading-tight">
                        Строим по всей Курганской области и соседним регионам.
                      </h3>
                      <p className="text-gray-300 text-sm leading-relaxed max-w-sm">
                        Наши технические базы размещены в г. Курган и г. Шадринск, что обеспечивает мобильность, оперативную доставку асфальтобетонных смесей и подачу катков на объекты.

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</body>
</html>
