        // Интерактивный компонент иконок Lucide
        function LucideIcon({ name, className = "", size = 24 }) {
            useEffect(() => {
                // Вызываем перерисовку иконок при изменении параметров
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            const iconMap = {
                "Hammer": "hammer",
                "Flame": "flame",
                "Truck": "truck",
                "Layers": "layers",
                "Trees": "trees",
                "Activity": "activity",
                "Spline": "spline",
                "Wallet": "wallet",
                "Wrench": "wrench",
                "FileCheck": "file-check",
                "Phone": "phone",
                "Mail": "mail",
                "MapPin": "map-pin",
                "Clock": "clock",
                "Send": "send",
                "ShieldCheck": "shield-check",
                "ArrowRight": "arrow-right",
                "CheckCircle2": "check-circle-2",
                "CheckCircle": "check-circle",
                "Star": "star",
                "Calendar": "calendar",
                "Eye": "eye",
                "Menu": "menu",
                "X": "x"
            };

            const lucideName = iconMap[name] || name.toLowerCase();
            return (
                <span className={`inline-flex items-center justify-center shrink-0 ${className}`} style={{ width: size, height: size }}>
                    <i data-lucide={lucideName} style={{ width: size, height: size }}></i>
                </span>
            );
        }

        function Footer() {
            const [name, setName] = useState("");
            const [phone, setPhone] = useState("");
            const [service, setService] = useState("");
            const [comment, setComment] = useState("");
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name.trim() || !phone.trim() || !service) {
                    setError("Пожалуйста, заполните все обязательные поля.");
                    return;
                }
                setError("");
                setSubmitted(true);
                setName("");
                setPhone("");
                setService("");
                setComment("");

            return (

                                        </div>

                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmit} id="callback-form" className="space-y-4 text-white">
                                        {error && <p className="text-rose-400 text-xs font-mono">{error}</p>}

                            <About 
                                onExploreServices={() => setActiveTab("services")} 
                                onExplorePortfolio={() => setActiveTab("portfolio")}

                                    <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">
                                        Контактная информация ООО «ЭЛЬБРУС»
                                    </h2>
                                    <p className="text-gray-600 font-sans max-w-2xl mx-auto text-base">
                                        Мы всегда на связи и готовы проконсультировать вас по любым дорожным, производственным и благоустроительным вопросам.
                                    </p>
                                    <div className="h-1.5 w-20 bg-amber-500 mx-auto rounded-full" />

                                    <div className="bg-white border border-gray-100 rounded-3xl p-8 sm:p-10 shadow-sm space-y-8 flex flex-col justify-between">
                                        <div className="space-y-6">
                                            <h3 className="font-display font-black text-2xl text-slate-900">Административный офис</h3>
                                            <p className="text-gray-600 text-sm sm:text-base leading-relaxed">
                                                Координируем дорожно-строительные работы по Курганской области. Располагаем собственным штатом из 26 высококвалифицированных специалистов и широким спектром современной дорожной спецтехники для укладки, разметки и земляных работ.
                                            </p>
                                        </div>

                                        <div className="space-y-4 pt-4 border-t border-gray-100">
                                            <div className="flex items-center space-x-3 text-sm sm:text-base text-gray-700">
                                                <LucideIcon name="MapPin" className="text-amber-500" size={18} />
                                                <span>640022, Курганская область, г. Курган, ул. Савельева, д. 58, кв. 33</span>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

</body>
</html>
