      // =========================================================

      function LucideIcon({ name, className = "", size = 24 }) {
        const kebabName = name
          .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
          .toLowerCase();

        const lucideLib = window.lucide;
        if (!lucideLib) return null;

        const iconKey = Object.keys(lucideLib.icons).find(
          k => k.toLowerCase() === name.toLowerCase() || k.toLowerCase() === kebabName.toLowerCase()
        );

        const iconSpec = iconKey ? lucideLib.icons[iconKey] : lucideLib.icons['hammer'];
        if (!iconSpec) return <span className={className}>⚒</span>;

        const svgString = iconSpec.toSvg({
          class: className,
          width: size,
          height: size,
          'stroke-width': 2,
          stroke: 'currentColor',
          fill: 'none',
        });

        return <span dangerouslySetInnerHTML={{ __html: svgString }} className="inline-block shrink-0" />;
      }

            <div className="text-center max-w-3xl mx-auto space-y-4">
              <h2 className="font-display font-black text-3xl text-slate-900">Наши дорожно-строительные услуги</h2>
              <div className="h-1.5 w-16 bg-amber-500 mx-auto rounded-full" />
            </div>

            <div className="bg-slate-950 rounded-3xl overflow-hidden shadow-2xl border border-slate-900">
              <div className="hidden lg:grid lg:grid-cols-12 gap-8 p-10 bg-slate-950 items-start">
                <div className="space-y-2 lg:col-span-5">
                  {SERVICES_DATA.map((s) => (
                    <button
                      key={s.id}
                      onClick={() => setActiveId(s.id)}
                      className={`w-full flex items-center justify-between text-left px-5 py-4 rounded-2xl font-display font-bold text-sm tracking-wide uppercase border transition-all ${
                        activeId === s.id ? "bg-amber-500 text-slate-950 border-amber-500" : "bg-slate-900/40 text-slate-300 border-white/5 hover:bg-slate-900 hover:text-white"

                      <div className="flex items-center space-x-3">
                        <LucideIcon name={s.iconName} className={activeId === s.id ? "text-slate-950" : "text-amber-500"} size={20} />
                        <span>{s.title}</span>
                      </div>
                      <LucideIcon name="ArrowRight" size={16} />

                          <li key={idx} className="flex items-start space-x-2">
                            <LucideIcon name="CheckCircle2" className="h-4 w-4 text-amber-500 shrink-0 mt-0.5" />
                            <span>{work}</span>
                          </li>

                      </ul>

              </div>

              {/* Мобильная версия аккордеонов */}
              <div className="block lg:hidden p-5 space-y-3 bg-slate-950">

                  const isOpen = activeId === s.id;
                  return (
                    <div key={s.id} className={`border rounded-xl overflow-hidden transition-all duration-300 ${isOpen ? "border-amber-500/40 bg-slate-900" : "border-white/5 bg-slate-900/40"}`}>

                          <LucideIcon name={s.iconName} className={isOpen ? "text-slate-950" : "text-amber-500"} size={18} />
                          <span>{s.title}</span>
                        </span>
                        <LucideIcon name="ChevronDown" size={16} />

                      {isOpen && (
                        <div className="p-5 text-white space-y-4 border-t border-white/5 animate-fade-in-up">

                            {s.includedWorks?.map((w, idx) => (
                              <li key={idx} className="flex items-start space-x-2">
                                <LucideIcon name="CheckCircle2" className="h-3.5 w-3.5 text-amber-500 shrink-0 mt-0.5" />
                                <span>{w}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      // =========================================================
      // ПОРТФОЛИО (Portfolio)
      // =========================================================
      function Portfolio() {
        const [filter, setFilter] = useState("Все");
        const [selected, setSelected] = useState(null);

        const categories = ["Все", "Строительство дорог", "Асфальтирование", "Благоустройство территорий", "Земляные работы"];
        const filtered = filter === "Все" 
          ? PORTFOLIO_DATA 
          : PORTFOLIO_DATA.filter((p) => p.category.toLowerCase().includes(filter.toLowerCase().substring(0, 8)));

        return (
          <div className="space-y-12 animate-fade-in-up">
            <div className="text-center max-w-3xl mx-auto space-y-4">
              <h2 className="font-display font-black text-3xl text-slate-900">Портфолио выполненных проектов</h2>
              <p className="text-gray-600 text-xs sm:text-sm font-sans">Курганская область, город Шадринск и федеральные направления</p>

            <div className="flex flex-wrap justify-center gap-2 overflow-x-auto pb-2 scrollbar-none">
              {categories.map((cat) => (
                <button
                  key={cat}

                    filter === cat ? "bg-slate-900 text-amber-400 border-slate-900" : "bg-white text-slate-600 border-gray-150"

                >
                  {cat}
                </button>
              ))}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8" id="portfolio-grid">
              {filtered.map((p) => (
                <div key={p.id} className="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 group flex flex-col h-full">
                  <div className="relative h-60 sm:h-64 overflow-hidden bg-slate-100">
                    <img src={p.imageUrl} alt={p.title} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-103" />
                    <div className="absolute top-4 left-4">
                      <span className="bg-slate-950/90 backdrop-blur-md text-amber-500 font-display font-black text-[10px] uppercase tracking-wider px-3.5 py-1.5 rounded-full border border-white/5">

                    <div className="absolute inset-0 bg-slate-950/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">

                    </div>
                  </div>

                  <div className="p-6 flex-1 flex flex-col justify-between space-y-6">
                    <div className="space-y-2">
                      <h3 className="font-display font-black text-lg text-slate-900 leading-snug group-hover:text-amber-600 transition-colors">{p.title}</h3>
                      <p className="text-gray-600 text-xs leading-relaxed font-sans line-clamp-3">{p.description}</p>
                    </div>

                    <div className="grid grid-cols-3 gap-2 pt-4 border-t border-gray-100 text-[10px] text-gray-500 font-mono">
                      <div>
                        <span className="block uppercase tracking-wider font-bold text-gray-400">Локация</span>
                        <span className="text-slate-800 font-sans font-semibold text-xs line-clamp-1">{p.location}</span>
                      </div>
                      <div>
                        <span className="block uppercase tracking-wider font-bold text-gray-400">Срок</span>
                        <span className="text-slate-800 font-sans font-semibold text-xs">{p.year}</span>
                      </div>
                      <div>
                        <span className="block uppercase tracking-wider font-bold text-gray-400">Объем</span>
                        <span className="text-slate-800 font-sans font-semibold text-xs line-clamp-1">{p.area || "ГОСТ"}</span>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Диалог быстрого просмотра */}
            {selected && (
              <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-3xl max-w-2xl w-full overflow-hidden shadow-2xl relative animate-fade-in-up">
                  <button onClick={() => setSelected(null)} className="absolute top-4 right-4 z-20 p-2 text-white bg-slate-900/60 rounded-full hover:bg-slate-950">✕</button>
                  <div className="h-52 sm:h-72 relative">
                    <img src={selected.imageUrl} alt={selected.title} className="w-full h-full object-cover" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/10 to-transparent" />
                    <div className="absolute bottom-4 left-6 right-6">
                      <span className="bg-amber-500 text-slate-950 font-display font-black text-[10px] uppercase tracking-wider px-3 py-1 rounded-full mb-2 inline-block">{selected.category}</span>
                      <h3 className="text-white text-lg sm:text-2xl font-display font-black leading-tight">{selected.title}</h3>
                    </div>
                  </div>
                  <div className="p-6 space-y-4">
                    <p className="text-gray-600 font-sans text-sm leading-relaxed">{selected.description}</p>
                    <div className="grid grid-cols-3 gap-3 text-[11px] font-mono text-gray-500">
                      <div className="bg-slate-50 p-3 rounded-xl">
                        <span className="block text-gray-400 font-bold uppercase mb-1">Регион</span>
                        <span className="text-slate-900 font-sans font-bold text-xs">{selected.location}</span>
                      </div>
                      <div className="bg-slate-50 p-3 rounded-xl">
                        <span className="block text-gray-400 font-bold uppercase mb-1">Период</span>
                        <span className="text-slate-900 font-sans font-bold text-xs">{selected.year}</span>
                      </div>
                      <div className="bg-slate-50 p-3 rounded-xl">
                        <span className="block text-gray-400 font-bold uppercase mb-1">Площадь</span>
                        <span className="text-slate-900 font-sans font-bold text-xs">{selected.area || "ГОСТ"}</span>
                      </div>
                    </div>
                    <div className="flex justify-end pt-2">
                      <button onClick={() => setSelected(null)} className="bg-slate-900 hover:bg-slate-800 text-white font-display font-bold text-xs uppercase px-5 py-2.5 rounded-lg">Закрыть</button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // =========================================================
      // ПОДВАЛ И КОНТАКТНАЯ ФОРМА (Footer)
      // =========================================================
      function Footer() {
        const [name, setName] = useState("");
        const [phone, setPhone] = useState("");
        const [service, setService] = useState("");
        const [comment, setComment] = useState("");
        const [submitted, setSubmitted] = useState(false);

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!name.trim() || !phone.trim() || !service) return;
          setSubmitted(true);
          setName(""); setPhone(""); setService(""); setComment("");
        };

        return (
          <footer className="bg-slate-950 text-gray-400 font-sans pt-16 pb-8 border-t border-slate-900 rounded-t-[32px] mt-16">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-12">

                {/* Левая инфо-колонка */}

                  <div className="space-y-4">

                      <div className="bg-amber-500 text-slate-950 p-2 rounded-lg">
                        <LucideIcon name="Route" className="h-5 w-5" />

                      <span className="font-display font-black text-xl sm:text-2xl text-white tracking-tight">ЭЛЬБРУС</span>

                        <LucideIcon name="Phone" className="h-5 w-5 text-amber-500 shrink-0 mt-0.5 animate-pulse" />
                        <div>
                          <span className="block font-semibold text-white font-display">+7 (3522) 55-04-76</span>
                          <span className="text-xs text-gray-500">Прием звонков и консультации</span>
                        </div>
                      </a>
                      <div className="flex items-start space-x-3 text-sm">
                        <LucideIcon name="Clock" className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                        <div>
                          <span className="block font-semibold text-white font-display">Пн - Вс: 08:00 - 21:00</span>
                          <span className="text-xs text-gray-500">Техника работает круглосуточно по согласованию</span>
                        </div>
                      </div>
                      <a href="mailto:elbrus-kurgan@yandex.ru" className="flex items-start space-x-3 text-sm hover:text-white transition-colors">
                        <LucideIcon name="Mail" className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                        <div>
                          <span className="block font-semibold text-white font-display">elbrus-kurgan@yandex.ru</span>
                          <span className="text-xs text-gray-500">Для коммерческих предложений</span>
                        </div>
                      </a>
                      <div className="flex items-start space-x-3 text-sm">
                        <LucideIcon name="MapPin" className="h-5 w-5 text-amber-500 shrink-0 mt-0.5" />
                        <div>
                          <span className="block font-semibold text-white font-display">Курганская область, г. Курган, ул. Савельева, д. 58</span>
                          <span className="text-xs text-gray-500">Площадки размещения катков в гг. Курган и Шадринск</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-slate-900 border border-white/5 rounded-2xl p-4 flex items-center space-x-3.5 max-w-sm">

                    <div>
                      <span className="block text-white font-display font-bold text-xs">СРО и ГОСТ лицензии в наличии</span>
                      <span className="block text-[10px] text-gray-500 mt-0.5">Полный перечень допусков на крупное дорожное строительство.</span>
                    </div>
                  </div>
                </div>

                {/* Интерактивная форма заявки на замер */}
                <div id="callback-form-box" className="lg:col-span-7 bg-slate-900 border border-white/5 rounded-3xl p-6 sm:p-8 space-y-6">
                  <div className="space-y-1">
                    <h3 className="font-display font-black text-lg sm:text-xl text-white">Заказать профессиональный расчёт</h3>

                        <div className="space-y-1">
                          <label className="text-[10px] font-mono text-gray-400 uppercase font-bold">Номер телефона <span className="text-amber-500">*</span></label>
                          <input type="tel" required placeholder="+7 (___) ___-__-__" value={phone} onChange={(e) => setPhone(e.target.value)} className="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:border-amber-500 focus:outline-none" />

                      </div>
                      <div className="space-y-1">

                          <option value="curb-installation">Установка бортовых камней</option>
                          <option value="landscaping">Благоустройство территорий и парков</option>
                          <option value="excavation">Разработка котлованов</option>
                          <option value="road-marking">Профессиональная разметка дорог</option>

                      <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-display font-black text-xs uppercase py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2 cursor-pointer">
                        <LucideIcon name="Send" size={14} />
                        Отправить заявку на замер
                      </button>
                      <span className="block text-[9px] text-gray-500 leading-normal text-center">Нажимая кнопку, вы даете согласие на обработку данных по ФЗ № 152.</span>
                    </form>
                  )}
                </div>
              </div>

              <div className="border-t border-slate-900 pt-6 flex flex-col sm:flex-row justify-between items-center text-[11px] text-gray-500 space-y-2 sm:space-y-0">
                <p>© {new Date().getFullYear()} ООО «ЭЛЬБРУС». Все права защищены.</p>
                <div className="flex gap-4">
                  <a href="#about" className="hover:text-amber-500">Политика конфиденциальности</a>
                  <a href="#services" className="hover:text-amber-500">Пользовательское соглашение</a>
                </div>
              </div>
            </div>
          </footer>
        );
      }

      // =========================================================
      // КОРНЕВОЕ ПРИЛОЖЕНИЕ (App.tsx)
      // =========================================================
      function App() {
        const [activeTab, setActiveTab] = useState("about");
        const [animateClass, setAnimateClass] = useState("opacity-100 translate-y-0");

        useEffect(() => {
          window.scrollTo({ top: 0, behavior: "smooth" });
          setAnimateClass("opacity-0 translate-y-1.5");
          const t = setTimeout(() => {
            setAnimateClass("opacity-100 translate-y-0 transition-all duration-350 ease-out");
          }, 40);
          return () => clearTimeout(t);
        }, [activeTab]);

        return (
          <div className="min-h-screen bg-slate-50/50 flex flex-col font-sans">
            <div className="hidden sm:block bg-slate-900 text-gray-400 py-2 px-4 text-xs font-medium border-b border-white/5">
              <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-1.5">
                <span className="flex items-center gap-1.5">
                  <span className="h-1.5 w-1.5 rounded-full bg-amber-500 animate-pulse" />
                  Работаем по всей Курганской области и Уральскому федеральному округу
                </span>
                <div className="flex items-center space-x-3 font-mono text-[10px]">
                  <span>ООО «ЭЛЬБРУС»</span>
                  <span>|</span>
                  <span>ИНН: 4501194763</span>
                </div>
              </div>
            </div>

            <Header activeTab={activeTab} setActiveTab={setActiveTab} />

            <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 w-full">
              <div className={animateClass}>
                {activeTab === "about" && (
                  <About 
                    onExploreServices={() => setActiveTab("services")} 
                    onExplorePortfolio={() => setActiveTab("portfolio")} 
                  />
                )}
                
                {activeTab === "services" && <Services />}
                
                {activeTab === "portfolio" && <Portfolio />}
                
                {activeTab === "contacts" && (
                  <div className="space-y-12 animate-fade-in-up">
                    <div className="text-center max-w-3xl mx-auto space-y-4">
                      <h2 className="font-display font-black text-3xl text-slate-900 tracking-tight">Контактная информация ООО «ЭЛЬБРУС»</h2>
                      <div className="h-1.5 w-16 bg-amber-500 mx-auto rounded-full" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                      <div className="bg-white border border-gray-100 rounded-3xl p-8 shadow-sm space-y-6 flex flex-col justify-between">
                        <div className="space-y-4">
                          <h3 className="font-display font-black text-xl text-slate-900">Административный офис</h3>
                          <p className="text-gray-600 text-xs sm:text-sm leading-relaxed">
                            Управление дорожно-строительными работами по Курганской области. Собственный штат специалистов и широкий спектр современной спецтехники для всех этапов дорожных работ.
                          </p>
                        </div>

                        <div className="space-y-3 font-sans text-xs sm:text-sm text-gray-700">
                          <div className="flex items-center space-x-2.5">
                            <LucideIcon name="MapPin" className="h-4 w-4 text-amber-500" />
                            <span>640022, Курганская обл., г. Курган, ул. Савельева, д. 58</span>
                          </div>
                          <div className="flex items-center space-x-2.5">
                            <LucideIcon name="Phone" className="h-4 w-4 text-amber-500" />
                            <span className="font-bold">+7 (3522) 55-04-76</span>
                          </div>
                        </div>

                        <div className="bg-amber-500/10 border border-amber-500/15 p-4 rounded-xl flex items-start space-x-2.5">
                          <LucideIcon name="Truck" className="h-5 w-5 text-amber-600 shrink-0 mt-0.5" />
                          <div>
                            <span className="block font-display font-bold text-xs text-slate-900">Выезд инженера и замерщика по Зауралью</span>
                            <span className="block text-[10px] text-slate-700 mt-1">Осуществляем оперативный выезд во все населенные пункты области бесплатно в рамках договорных отношений.</span>
                          </div>
                        </div>
                      </div>

                      <div className="bg-slate-900 rounded-3xl p-8 shadow-sm text-white flex flex-col justify-between relative overflow-hidden min-h-[320px]">
                        <div className="absolute inset-0 bg-cover bg-center brightness-40 pointer-events-none" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&w=800&q=80')` }} />
                        <div className="relative z-10 space-y-4">
                          <span className="text-[9px] bg-amber-500/20 text-amber-400 font-mono font-bold px-3 py-1 rounded-full border border-amber-500/20 uppercase">Курган и Шадринск</span>
                          <h3 className="font-display font-black text-xl sm:text-2xl text-white">Работаем по всей Курганской области.</h3>
                          <p className="text-gray-300 text-xs leading-relaxed max-w-sm">Базирование спецтехники в ключевых узлах области обеспечивает быструю доставку смесей и экономию на перемещении техники.</p>
                        </div>
                        <div className="relative z-10 pt-4">
                          <button onClick={() => document.getElementById("callback-form-box").scrollIntoView({ behavior: "smooth" })} className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-display font-black text-[10px] uppercase tracking-widest px-5 py-3 rounded-lg shadow-md">Вызвать замерщика</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </main>

            <Footer />
          </div>
        );
      }

      // Отрисовка приложения в корневой DOM-узел
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
