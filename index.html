                      <button 
                        onClick={() => {
                          const formBox = document.getElementById("callback-form-box");
                          if (formBox) {
                            formBox.scrollIntoView({ behavior: "smooth" });
                          }
                        }}
                        className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-sans font-black text-xs uppercase tracking-widest px-6 py-3.5 rounded-xl transition-all cursor-pointer shadow-md"
                      >
                        Заказать выезд инженера
                      </button>
                    </div>
                  </div>

                </div>
              </div>
            )}
          </main>

          {/* Public corporate footer */}
          <Footer />

        </div>
      );
    }

    // Mounting the application
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
