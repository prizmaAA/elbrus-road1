            <path d="M19 17h2c.6 0 1-.4 1-1v-2c0-.6-.4-1-1-1h-2a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2z" />
            <path d="M3 7h2c.6 0 1-.4 1-1V4c0-.6-.4-1-1-1H3a2 2 0 0 0-2 2v2c0 1.1.9 2 2 2z" />
            <path d="M5 12h14" />
          </svg>
        );
      }

      function MailIcon({ className }) {
        return (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        );
      }

      function ClockIcon({ className }) {
        return (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        );
      }

      function ShieldCheckIcon({ className }) {
        return (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            <polyline points="9 11 11 13 15 9" />
          </svg>
        );
      }

      function SendIcon({ className }) {
        return (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" x2="11" y1="2" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        );
      }

      function WrenchIcon({ className }) {
        return (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
          </svg>
        );
      }

      function MyLucideIcon({ name, className }) {
        const defaultClass = className || "h-5 w-5";
        switch (name) {
          case "Route": return <RouteIcon className={defaultClass} />;
          case "Flame": return <FlameIcon className={defaultClass} />;
          case "Truck": return <TruckIcon className={defaultClass} />;
          case "Layers": return <LayersIcon className={defaultClass} />;
          case "Trees": return <TreesIcon className={defaultClass} />;
          case "Activity": return <ActivityIcon className={defaultClass} />;
          case "Spline": return <SplineIcon className={defaultClass} />;
          case "Wallet": return <WalletIcon className={defaultClass} />;
          case "Wrench": return <WrenchIcon className={defaultClass} />;
          case "FileCheck": return <FileCheckIcon className={defaultClass} />;
          case "Calendar": return <CalendarIcon className={defaultClass} />;
          case "MapPin": return <MapPinIcon className={defaultClass} />;
          case "Phone": return <PhoneIcon className={defaultClass} />;
          case "Mail": return <MailIcon className={defaultClass} />;
          case "Clock": return <ClockIcon className={defaultClass} />;
          case "ShieldCheck": return <ShieldCheckIcon className={defaultClass} />;
          case "Send": return <SendIcon className={defaultClass} />;
          default: return <RouteIcon className={defaultClass} />;
        }
      }

      // ==========================================
      // ANIMATION TRANSITION CONTAINER
      // ==========================================
      function TabTransition({ trigger, children }) {
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          setVisible(false);
          const timer = setTimeout(() => {
            setVisible(true);
          }, 30);
          return () => clearTimeout(timer);
        }, [trigger]);

        return (
          <div className={`transition-all duration-300 ease-out transform ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-3'}`}>
            {children}
          </div>
        );
      }

      // ==========================================
      // HEADER COMPONENT
      // ==========================================
      function Header({ activeTab, setActiveTab }) {
        const [isOpen, setIsOpen] = useState(false);

        const navigationItems = [
          { id: "about", label: "О компании" },
          { id: "services", label: "Услуги" },
          { id: "portfolio", label: "Наши работы" },
          { id: "contacts", label: "Контакты" },
        ];

        return (
          // 3. MENU THICKNESS: White navigation header padded with py-5 sm:py-6 for rich volume and premium design feel
          <header id="app-header" className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all duration-300 py-5 sm:py-6">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center">
                
                {/* Logo Brand */}
                <div 
                  id="logo-brand" 
                  className="flex items-center space-x-3 cursor-pointer group"
                  onClick={() => setActiveTab("about")}
                >
                  <div className="bg-amber-500 text-slate-900 p-2.5 rounded-xl shadow-md group-hover:bg-amber-600 transition-colors">
                    <RouteIcon className="h-6 sm:h-7 w-6 sm:w-7" />
                  </div>
                  <div>
                    <span className="block font-display font-black text-xl sm:text-2xl tracking-tight text-slate-900 group-hover:text-amber-600 transition-colors">
                      ЭЛЬБРУС
                    </span>
                    <span className="block text-[10px] sm:text-xs font-mono uppercase tracking-[0.15em] text-slate-500 font-bold">
                      производство и дорожное строительство
                    </span>
                  </div>
                </div>

                {/* Desktop Navigation Links */}
                <nav id="desktop-nav" className="hidden md:flex items-center space-x-2 lg:space-x-4">
                  {navigationItems.map((item) => (
                    <button
                      key={item.id}
                      id={`nav-${item.id}`}
                      onClick={() => setActiveTab(item.id)}
                      className={`px-5 py-3 rounded-xl font-display font-bold text-sm tracking-wide uppercase transition-all duration-200 border-2 cursor-pointer ${
                        activeTab === item.id
                          ? "bg-slate-900 text-white border-slate-900 shadow-sm"
                          : "bg-transparent text-slate-700 border-transparent hover:bg-slate-50 hover:text-slate-900 hover:border-slate-200"
                      }`}
                    >
                      {item.label}
                    </button>
                  ))}
                </nav>

                {/* Right Action Call Button */}
                <div className="hidden lg:flex items-center space-x-3">
                  <a 
                    href="tel:+73522550476" 
                    id="header-phone-link"
                    className="flex items-center space-x-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-5 py-3 rounded-xl transition-all duration-200 shadow-sm hover:shadow-md cursor-pointer"
                  >
                    <PhoneIcon className="h-4 w-4" />
                    <span className="font-display text-sm tracking-wide font-black">+7 (3522) 55-04-76</span>
                  </a>
                </div>

                {/* Mobile Menu Icon */}
                <div className="md:hidden flex items-center">
                  <button
                    onClick={() => setIsOpen(!isOpen)}
                    id="mobile-menu-btn"
                    className="p-2.5 rounded-xl bg-slate-50 text-slate-700 hover:bg-slate-100 hover:text-slate-900 focus:outline-none cursor-pointer"
                  >
                    {isOpen ? <XIcon className="h-6 w-6" /> : <MenuIcon className="h-6 w-6" />}
                  </button>
                </div>
              </div>
            </div>

            {/* Mobile Dropdown Options */}
            {isOpen && (
              <div id="mobile-menu" className="md:hidden bg-white border-b border-gray-100 py-4 px-4 mt-4 space-y-2 animate-feedIn">
                {navigationItems.map((item) => (
                  <button
                    key={item.id}
                    onClick={() => {
                      setActiveTab(item.id);
                      setIsOpen(false);
                    }}
                    className={`block w-full text-left px-5 py-3.5 rounded-xl font-display font-bold text-sm uppercase tracking-wide transition-all ${
                      activeTab === item.id
                        ? "bg-slate-900 text-white"
                        : "bg-slate-50 text-slate-700 hover:bg-slate-100"
                    }`}
                  >
                    {item.label}
                  </button>
                ))}
                <a
                  href="tel:+73522550476"
                  className="flex items-center justify-center space-x-2 w-full bg-amber-500 text-slate-900 font-bold px-5 py-3.5 rounded-xl text-center shadow-sm"
                >
                  <PhoneIcon className="h-4 w-4" />
                  <span className="font-display text-sm tracking-wide">+7 (3522) 55-04-76</span>
                </a>
              </div>
            )}
          </header>
        );
      }

      // ==========================================
      // ABOUT SECTION COMPONENT
      // ==========================================

              <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-amber-500/10 via-slate-950/95 to-slate-950 pointer-events-none z-0" />
              
              <div className="relative z-10 px-6 py-16 sm:py-20 md:py-24 max-w-5xl mx-auto text-center space-y-8">
                <div 
                  className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-amber-500/10 text-amber-500 border border-amber-500/25 text-xs font-semibold tracking-wider uppercase"

                  <StarIcon className="h-3.5 w-3.5 fill-current" />

                <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-slate-900/30 to-transparent flex flex-col justify-end p-6 sm:p-8">
                  <span className="text-amber-400 font-mono text-xs uppercase tracking-widest font-bold mb-1">Процесс укладки</span>
                  <h3 className="text-white text-xl sm:text-2xl font-display font-black leading-tight">Современное дорожное полотно</h3>
                  <p className="text-gray-300 text-sm mt-1 max-w-md">Строительство с прочным подготовленным щебёночным основанием и износостойким покрытием.</p>
                </div>
              </div>

              <div id="photo-box-2" className="group relative h-[320px] sm:h-[400px] rounded-3xl overflow-hidden shadow-xl border border-gray-100">
                <img 
                  src="https://images.unsplash.com/photo-1590069261209-f8e9b8642343?auto=format&fit=crop&w=1200&q=80" 
                  alt="Высококачественное готовое покрытие"
                  referrerPolicy="no-referrer"
                  className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"

                <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 via-slate-900/30 to-transparent flex flex-col justify-end p-6 sm:p-8">

                  <h3 className="text-white text-xl sm:text-2xl font-display font-black leading-tight">Идеально ровный асфальтобетон</h3>
                  <p className="text-gray-300 text-sm mt-1 max-w-md">Долговечное покрытие тротуаров и городских магистралей с гарантией безупречной эксплуатации.</p>
                </div>
              </div>
            </section>

            {/* 3. Why Choose Us */}
            <section id="why-choose-us" className="bg-white border border-gray-100 rounded-3xl p-8 sm:p-12 shadow-sm">
              <div className="text-center mb-12 sm:mb-16">
                <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">

                </h2>
                <div className="h-1.5 w-20 bg-amber-500 mx-auto mt-4 rounded-full" />

                  <div key={item.id} id={`benefit-item-${index + 1}`} className="flex flex-col items-center text-center px-4 py-8 md:py-4 first:pt-0 last:pb-0 md:first:pl-0 md:last:pr-0">

                  <p className="text-gray-400 text-xs sm:text-sm font-semibold uppercase tracking-wider font-display">Лет опыта работы</p>
                </div>
                <div className="space-y-2">
                  <p className="text-4xl sm:text-5xl font-display font-black text-amber-500">450+</p>
                  <p className="text-gray-400 text-xs sm:text-sm font-semibold uppercase tracking-wider font-display">Объектов сдано</p>
                </div>

                  <p className="text-4xl sm:text-5xl font-display font-black text-amber-500">35 ед.</p>

      // ==========================================
      // SERVICES COMPONENT
      // ==========================================
      function Services() {

                            ? "bg-amber-500 text-slate-950 border-amber-500 translate-x-1"

                      >

                  <TabTransition trigger={activeServiceId}>
                    <div className="space-y-6 flex-grow flex flex-col justify-between">

                        </div>

                        >
                          <span>Получить консультацию и расчет стоимости</span>

              {/* MOBILE ACCORDIONS VIEW */}

                <span className="block text-amber-500 font-mono text-[10px] uppercase font-bold tracking-widest pl-2 mb-3">

                      <div

                                  }
                                }}

                              >

                              </a>

          </div>

      // ==========================================
      // PORTFOLIO COMPONENT
      // ==========================================
      function Portfolio() {
        const [filter, setFilter] = useState("Все");
        const [selectedProject, setSelectedProject] = useState(null);

        const categories = ["Все", "Строительство дорог", "Асфальтирование", "Благоустройство территорий", "Земляные работы"];

        const filteredProjects = filter === "Все" 
          ? PORTFOLIO_DATA 
          : PORTFOLIO_DATA.filter((p) => p.category.toLowerCase().includes(filter.toLowerCase().substring(0, 8)));

        return (
          <div id="portfolio-section" className="space-y-12 animate-feedIn">
            
            {/* Header Info */}
            <div className="text-center max-w-3xl mx-auto space-y-4">
              <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">
                Портфолио выполненных проектов
              </h2>
              <p className="text-gray-600 font-sans max-w-2xl mx-auto text-base">

            <div id="portfolio-filters" className="flex flex-wrap justify-center gap-2 overflow-x-auto pb-2 scrollbar-none">
              {categories.map((cat) => (
                <button
                  key={cat}
                  id={`filter-btn-${cat}`}
                  onClick={() => setFilter(cat)}
                  className={`px-5 py-2.5 rounded-xl font-display font-bold text-xs sm:text-sm uppercase tracking-wide transition-all duration-200 border cursor-pointer ${
                    filter === cat
                      ? "bg-slate-900 text-amber-400 border-slate-900 shadow-sm"
                      : "bg-white text-slate-600 border-gray-150 hover:bg-gray-50 hover:text-slate-900"

                    <div className="absolute top-4 left-4 pt-1 z-10">
                      <span className="bg-slate-950/90 backdrop-blur-md text-amber-500 font-display font-black text-[10px] uppercase tracking-wider px-3.5 py-1.5 rounded-full border border-white/5">
                        {project.category}

                    </div>
                    
                    {/* Overlay project select trigger */}
                    <div className="absolute inset-0 bg-slate-950/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                      <button 
                        onClick={() => setSelectedProject(project)}
                        className="p-3.5 bg-amber-500 text-slate-950 rounded-full font-bold shadow-md hover:scale-110 transition-transform flex items-center justify-center cursor-pointer"
                      >
                        <EyeIcon className="h-5 w-5" />
                      </button>
                    </div>
                  </div>

                  {/* Descriptions */}
                  <div className="p-6 sm:p-8 flex-1 flex flex-col justify-between space-y-6">
                    <div className="space-y-3">
                      <h3 className="font-display font-black text-xl text-slate-900 leading-tight group-hover:text-amber-600 transition-colors">
                        {project.title}
                      </h3>
                      <p className="text-gray-600 text-sm font-sans line-clamp-3 leading-relaxed">
                        {project.description}

                    </div>

                    <div className="grid grid-cols-3 gap-2 pt-4 border-t border-gray-100 text-xs text-gray-500 font-mono">
                      <div className="space-y-1">
                        <span className="flex items-center text-[10px] uppercase tracking-wider font-bold text-gray-400">
                          <MapPinIcon className="h-3 w-3 text-amber-500 mr-1 shrink-0" />
                          Локация
                        </span>
                        <span className="text-slate-800 font-sans font-semibold line-clamp-1">{project.location}</span>
                      </div>
                      <div className="space-y-1">
                        <span className="flex items-center text-[10px] uppercase tracking-wider font-bold text-gray-400">
                          <CalendarIcon className="h-3 w-3 text-amber-500 mr-1 shrink-0" />
                          Срок
                        </span>
                        <span className="text-slate-800 font-sans font-semibold">{project.year}</span>
                      </div>
                      <div className="space-y-1">
                        <span className="flex items-center text-[10px] uppercase tracking-wider font-bold text-gray-400">
                          <LayersIcon className="h-3 w-3 text-amber-500 mr-1 shrink-0" />
                          Объем
                        </span>
                        <span className="text-slate-800 font-sans font-semibold line-clamp-1">{project.area || "ГОСТ"}</span>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Lightbox details modal */}
            {selectedProject && (
              <div id="project-modal" className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div 
                  id="modal-content"
                  className="bg-white rounded-3xl max-w-3xl w-full overflow-hidden shadow-2xl border border-gray-100 flex flex-col relative animate-feedIn"
                >
                  <button 
                    onClick={() => setSelectedProject(null)}
                    className="absolute top-4 right-4 z-20 w-8 h-8 flex items-center justify-center text-white bg-slate-900/60 rounded-full hover:bg-slate-950 hover:text-white transition-colors cursor-pointer"
                  >
                    ✕
                  </button>

                  <div className="h-64 sm:h-96 relative">
                    <img 
                      src={selectedProject.imageUrl} 
                      alt={selectedProject.title}
                      referrerPolicy="no-referrer"
                      className="w-full h-full object-cover" 
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/20 to-transparent" />
                    <div className="absolute bottom-6 left-6 right-6">
                      <span className="bg-amber-500 text-slate-950 font-display font-black text-xs uppercase tracking-wider px-3.5 py-1.5 rounded-full mb-3 inline-block">
                        {selectedProject.category}
                      </span>
                      <h3 className="text-white text-2xl sm:text-3xl font-display font-black leading-tight">
                        {selectedProject.title}
                      </h3>
                    </div>
                  </div>

                  <div className="p-6 sm:p-8 space-y-6">
                    <p className="text-gray-600 font-sans text-sm sm:text-base leading-relaxed">
                      {selectedProject.description}
                    </p>

                    <hr className="border-gray-100" />

                    <div className="grid grid-cols-3 gap-4 text-xs font-mono text-gray-500">
                      <div className="bg-slate-50 p-4 rounded-2xl">
                        <span className="block text-gray-400 font-display font-bold uppercase tracking-wider mb-1">Регион объекта</span>
                        <span className="text-slate-900 font-sans font-bold text-sm sm:text-base">{selectedProject.location}</span>
                      </div>
                      <div className="bg-slate-50 p-4 rounded-2xl">
                        <span className="block text-gray-400 font-display font-bold uppercase tracking-wider mb-1">Год сдачи</span>
                        <span className="text-slate-900 font-sans font-bold text-sm sm:text-base">{selectedProject.year}</span>
                      </div>
                      <div className="bg-slate-50 p-4 rounded-2xl">
                        <span className="block text-gray-400 font-display font-bold uppercase tracking-wider mb-1">Общая площадь</span>
                        <span className="text-slate-900 font-sans font-bold text-sm sm:text-base">{selectedProject.area || "ГОСТ"}</span>
                      </div>
                    </div>

                    <div className="flex justify-end pt-2">
                      <button 
                        onClick={() => setSelectedProject(null)}
                        className="bg-slate-900 hover:bg-slate-800 text-white font-display font-bold text-xs uppercase tracking-widest px-6 py-3 rounded-xl transition-colors cursor-pointer"
                      >
                        Закрыть
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

            <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-16">

                  />

                {activeTab === "services" && <Services />}
                
                {activeTab === "portfolio" && <Portfolio />}
                
                {activeTab === "contacts" && (
                  <div className="space-y-12">
                    <div className="text-center max-w-3xl mx-auto space-y-4">
                      <h2 className="font-display font-black text-3xl sm:text-4xl text-slate-900 tracking-tight">
                        Контактная информация ООО «ЭЛЬБРУС»

                      <p className="text-gray-600 font-sans max-w-2xl mx-auto text-base">
                        Мы всегда на связи и готовы проконсультировать вас по любым дорожным, производственным и благоустроительным вопросам.
                      </p>
                      <div className="h-1.5 w-20 bg-amber-500 mx-auto rounded-full" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                      {/* Left info box */}
                      <div className="bg-white border border-gray-100 rounded-3xl p-8 sm:p-10 shadow-sm space-y-8 flex flex-col justify-between">
                        <div className="space-y-6">
                          <h3 className="font-display font-black text-2xl text-slate-900">Административный офис</h3>
                          <p className="text-gray-600 text-sm sm:text-base leading-relaxed font-sans">
                            Координируем дорожно-строительные работы по Курганской области. Располагаем собственным штатом из 26 высококвалифицированных специалистов и широким спектром современной дорожной спецтехники для укладки, разметки и земляных работ.
                          </p>
                        </div>

                        <div className="space-y-4">
                          <div className="flex items-center space-x-3 text-sm sm:text-base text-gray-700">
                            <MapPinIcon className="h-5 w-5 text-amber-500 shrink-0" />
                            <span className="font-sans">640022, Курганская область, г. Курган, ул. Савельева, д. 58, кв. 33</span>
                          </div>
                          <div className="flex items-center space-x-3 text-sm sm:text-base text-gray-700">
                            <PhoneIcon className="h-5 w-5 text-amber-500 shrink-0" />
                            <span className="font-semibold font-sans">+7 (3522) 55-04-76</span>
                          </div>
                        </div>

                        <div className="bg-amber-500/10 border border-amber-500/15 p-5 rounded-2xl flex items-start space-x-3">
                          <TruckIcon className="h-6 w-6 text-amber-500 shrink-0 mt-0.5" />
                          <div>
                            <span className="block font-display font-bold text-slate-900 text-xs sm:text-sm">Бесплатный выезд инженера и замерщика</span>

                            </span>
                          </div>
                        </div>
                      </div>

                      {/* Right decoration map showcase */}
                      <div className="bg-slate-900 rounded-3xl p-8 sm:p-10 shadow-sm text-white flex flex-col justify-between relative overflow-hidden min-h-[350px]">
                        <div className="absolute inset-0 bg-cover bg-center brightness-40 pointer-events-none z-0" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1542224566-6e85f2e6772f?auto=format&fit=crop&w=1200&q=80')` }} />
                        <div className="relative z-10 space-y-6">
                          <span className="text-[10px] bg-amber-500/20 text-amber-400 font-mono font-bold border border-amber-500/20 px-3.5 py-1.5 rounded-full uppercase tracking-wider">
                            Производственные мощности
                          </span>
                          <h3 className="font-display font-black text-2xl sm:text-3xl text-white tracking-tight leading-tight">
                            Строим по всей Курганской области и соседним регионам.
                          </h3>
                          <p className="text-gray-300 text-sm leading-relaxed max-w-sm font-sans">
                            Наши технические базы размещены в г. Курган и г. Шадринск, что обеспечивает мобильность, оперативную доставку асфальтобетонных смесей и подачу катков на объекты.
                          </p>
                        </div>

                        <div className="relative z-10 pt-6">
                          <button 
                            onClick={() => {
                              const formBox = document.getElementById("callback-form-box");
                              if (formBox) {
                                formBox.scrollIntoView({ behavior: "smooth" });
                              }
                            }}
                            className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-display font-black text-xs uppercase tracking-widest px-6 py-3.5 rounded-xl transition-all cursor-pointer shadow-md"
                          >
                            Заказать выезд инженера
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </TabTransition>

            </main>

            {/* Permanent corporate footer */}
            <Footer />

          </div>
        );
      }

      // Render our compiled monolith React Application inside #root
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
